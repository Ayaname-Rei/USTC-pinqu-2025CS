<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>USTC2511学习生活记录</title>
  <link rel="icon" href="assets/icon.ico" type="image/x-icon" sizes="any">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="manifest" href="assets/site.webmanifest">
  <meta name="theme-color" content="#07559d">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav-shell" aria-label="主导航">
      <a class="brand" href="#top" aria-label="回到首页">
        <img class="brand-mark" src="assets/icon.png" alt="" aria-hidden="true">
        <span>USTC 2025 CS</span>
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-links" aria-label="打开导航">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
      <div class="nav-links" id="nav-links">
        <a class="github-link" href="https://github.com/Ayaname-Rei/USTC-pinqu-2025CS" target="_blank" rel="noopener" aria-label="GitHub 仓库">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2C6.48 2 2 6.59 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49 0-.24-.01-1.04-.01-1.89-2.78.62-3.37-1.21-3.37-1.21-.45-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.37-2.22-.26-4.55-1.14-4.55-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05A9.35 9.35 0 0 1 12 6.99c.85 0 1.71.12 2.51.34 1.91-1.33 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.06.36.32.68.94.68 1.9 0 1.37-.01 2.48-.01 2.82 0 .27.18.59.69.49A10.09 10.09 0 0 0 22 12.25C22 6.59 17.52 2 12 2Z"/>
          </svg>
        </a>
        <a href="#journals">期刊</a>
        <a href="#timeline">班级风采</a>
        <a href="#gallery">图库</a>
      </div>
    </nav>
  </header>

  <main id="top">
    <section class="section-shell journal-section" id="journals" aria-labelledby="journals-title">
      <div class="section-heading">
        <p class="eyebrow">Journal Archive</p>
        <h2 id="journals-title">期刊</h2>
      </div>
      <div class="journal-layout">
        <aside class="issue-index timeline-rail" aria-label="期刊月份索引">
          <div id="issue-index-list"></div>
        </aside>
        <div class="journal-list" id="journal-list" aria-live="polite"></div>
      </div>
    </section>

    <section class="section-shell" id="timeline" aria-labelledby="timeline-title">
      <div class="section-heading">
        <p class="eyebrow">Class Highlights</p>
        <h2 id="timeline-title">班级风采</h2>
      </div>
      <div class="timeline" id="timeline-list" aria-live="polite"></div>
    </section>

    <section class="section-shell gallery-section" id="gallery" aria-labelledby="gallery-title">
      <div class="section-heading split-heading">
        <div>
          <p class="eyebrow">Gallery</p>
          <h2 id="gallery-title">全部照片</h2>
        </div>
      </div>
      <div class="gallery-grid" id="gallery-grid" aria-live="polite"></div>
    </section>
  </main>

  <div class="preview-modal" id="photo-preview" role="dialog" aria-modal="true" aria-label="照片预览" hidden>
    <button class="preview-backdrop" type="button" data-preview-close aria-label="关闭预览"></button>
    <figure class="preview-frame">
      <button class="preview-close" type="button" data-preview-close aria-label="关闭预览">×</button>
      <img id="preview-image" alt="">
      <figcaption>
        <strong id="preview-title"></strong>
        <span id="preview-date"></span>
      </figcaption>
    </figure>
  </div>

  <script src="assets/site.js"></script>
</body>
</html>
